name: Update Language Stats

on:
  schedule:
    - cron: '0 23 * * *'   # Daily at 7:00 AM PHT (23:00 UTC)
  push:
    branches:
      - main
    paths:
      - '.github/scripts/multi_repo_languages.py'
      - '.github/workflows/multi_repo_languages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-languages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate Stats Card
        env:
          PROFILE_GITHUB_TOKEN: ${{ secrets.PROFILE_GITHUB_TOKEN }}
        run: |
          python .github/scripts/multi_repo_languages.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/multi_repo_languages.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore(stats): update multi-repo language distribution [skip ci]"
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
