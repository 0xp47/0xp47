name: Release Generator

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Generate GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Changelog & Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            
            // Get all tags sorted by date to find the previous tag
            const tags = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            let previousTag = '';
            if (tags.data.length > 1) {
              previousTag = tags.data[1].name;
            }
            
            console.log(`Current Tag: ${tag}`);
            console.log(`Previous Tag: ${previousTag}`);
            
            // Generate release notes using GitHub's release notes generation API
            const notesResponse = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              previous_tag_name: previousTag || undefined
            });
            
            const releaseBody = notesResponse.data.body;
            
            // Create Release
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseBody,
              draft: false,
              prerelease: false
            });
            
            console.log(`Release ${tag} successfully created!`);
