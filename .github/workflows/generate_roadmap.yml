name: Generate Visual Roadmap

on:
  push:
    paths:
      - 'stats/roadmap.json'
  schedule:
    - cron: '0 23 * * *'   # Daily at 7:00 AM PHT (23:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate Roadmap SVG
        run: |
          python .github/scripts/generate_roadmap.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/roadmap.svg stats/roadmap.json
          if ! git diff --quiet; then
            git commit -m "chore(roadmap): auto-update project roadmap Gantt chart [skip ci]"
            git push origin main
          else
            echo "No roadmap changes to push"
          fi
