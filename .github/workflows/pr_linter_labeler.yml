name: PR Lint & Label

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Semantic PR Title Linter
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  labeler:
    name: Auto-Label Files
    runs-on: ubuntu-latest
    steps:
      - name: Labeler Action
        uses: actions/labeler@v7
        with:
          configuration-path: .github/labeler.yml
          dot: true
