name: Daily Quote Rotator

on:
  schedule:
    - cron: '0 0 * * *'   # Run daily at midnight (UTC)
  workflow_dispatch:      # Allow manual triggering

permissions:
  contents: write

jobs:
  rotate-quote:
    runs-on: ubuntu-latest
    name: Rotate Developer Quote

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rotate Quote
        run: python .github/scripts/quote_updater.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/quote.json
          
          if git diff --staged --quiet; then
            echo "No quote changes."
            exit 0
          fi
          
          git commit -m "chore(quote): rotate active developer quote [skip ci]"
          git push origin HEAD:main
