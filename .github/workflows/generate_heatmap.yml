name: Generate WakaTime Stats Card

on:
  schedule:
    - cron: '0 0 * * 0'   # Run every Sunday at midnight (UTC)
  workflow_dispatch:      # Allow manual triggering

permissions:
  contents: write

jobs:
  generate-card:
    runs-on: ubuntu-latest
    name: Generate Stats SVG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Stats Card Generator
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python .github/scripts/generate_heatmap.py

      - name: Commit and push SVG card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          
          if git diff --staged --quiet; then
            echo "No changes in stats card."
            exit 0
          fi
          
          git commit -m "chore(stats): update stats SVG card [skip ci]"
          git push origin HEAD:main
