name: Dependency Compliance Audit

on:
  schedule:
    - cron: '0 0 * * 1'   # Weekly on Mondays at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Audit Dependencies
        run: |
          python .github/scripts/audit_dependencies.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt stats/compliance_report.md
          if ! git diff --quiet; then
            git commit -m "chore(compliance): auto-update dependency compliance reports [skip ci]"
            git push origin main
          else
            echo "No compliance changes to push"
          fi
