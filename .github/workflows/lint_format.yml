name: Auto Format & Lint

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.md'
      - '**.yml'
      - '**.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    name: Code Formatting

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install formatter tools
        run: |
          pip install black
          npm install -g prettier

      - name: Format Python scripts
        run: black .github/scripts/*.py

      - name: Format Markdown and YAML
        run: prettier --write "README.md" "achievements/*.md" ".github/workflows/*.yml"

      - name: Commit and push formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No formatting changes detected."
            exit 0
          fi

          git commit -m "style: auto-format code and docs [skip ci]"
          git pull --rebase -X theirs origin main
          git push origin HEAD:main
