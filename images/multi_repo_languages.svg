<svg xmlns="http://www.w3.org/2000/svg" width="850" height="180" viewBox="0 0 850 180">
    <style>
        .card {
            fill: #0d1117;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 1.5;
        }
        .title {
            fill: #58a6ff;
            font-family: 'Segoe UI', Ubuntu, sans-serif;
            font-size: 15px;
            font-weight: 700;
        }
        .bar-container {
            mask: url(#bar-mask);
        }
        .legend-text {
            font-family: 'Segoe UI', Ubuntu, sans-serif;
            font-size: 13px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animated {
            animation: fadeIn 0.8s ease-in-out forwards;
        }
    </style>

    <rect class="card" width="848" height="178" rx="12" x="1" y="1"/>
    
    <g transform="translate(30, 30)" class="animated">
        <!-- Title -->
        <text x="0" y="5" class="title">📊 Multi-Repository Language Distribution</text>
        
        <!-- Stacked Progress Bar -->
        <mask id="bar-mask">
            <rect x="0" y="25" width="790" height="16" rx="8" fill="white"/>
        </mask>
        <g class="bar-container" mask="url(#bar-mask)">
            <rect x="0.00%" y="0" width="58.31%" height="16" fill="#3572A5" rx="2"/><rect x="58.31%" y="0" width="11.45%" height="16" fill="#e34c26" rx="2"/><rect x="69.76%" y="0" width="11.17%" height="16" fill="#4F5D95" rx="2"/><rect x="80.93%" y="0" width="9.73%" height="16" fill="#3178c6" rx="2"/><rect x="90.66%" y="0" width="4.17%" height="16" fill="#858585" rx="2"/><rect x="94.83%" y="0" width="1.90%" height="16" fill="#563d7c" rx="2"/><rect x="96.73%" y="0" width="1.60%" height="16" fill="#858585" rx="2"/><rect x="98.33%" y="0" width="1.59%" height="16" fill="#858585" rx="2"/><rect x="99.92%" y="0" width="0.08%" height="16" fill="#858585" rx="2"/>
        </g>
        
        <!-- Legend Grid -->
        <g class="legend-text">
            
            <g transform="translate(45, 110)">
                <circle cx="0" cy="0" r="6" fill="#3572A5"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">Python</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">58.3%</text>
            </g>
        
            <g transform="translate(235, 110)">
                <circle cx="0" cy="0" r="6" fill="#e34c26"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">HTML</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">11.5%</text>
            </g>
        
            <g transform="translate(425, 110)">
                <circle cx="0" cy="0" r="6" fill="#4F5D95"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">PHP</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">11.2%</text>
            </g>
        
            <g transform="translate(615, 110)">
                <circle cx="0" cy="0" r="6" fill="#3178c6"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">TypeScript</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">9.7%</text>
            </g>
        
            <g transform="translate(45, 140)">
                <circle cx="0" cy="0" r="6" fill="#858585"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">Batchfile</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">4.2%</text>
            </g>
        
            <g transform="translate(235, 140)">
                <circle cx="0" cy="0" r="6" fill="#563d7c"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">CSS</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">1.9%</text>
            </g>
        
            <g transform="translate(425, 140)">
                <circle cx="0" cy="0" r="6" fill="#858585"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">PowerShell</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">1.6%</text>
            </g>
        
            <g transform="translate(615, 140)">
                <circle cx="0" cy="0" r="6" fill="#858585"/>
                <text x="16" y="5" fill="#c9d1d9" font-size="13" font-family="Segoe UI, sans-serif" font-weight="600">Hack</text>
                <text x="135" y="5" fill="#8b949e" font-size="12" font-family="Segoe UI, sans-serif" text-anchor="end">1.6%</text>
            </g>
        
        </g>
    </g>
</svg>